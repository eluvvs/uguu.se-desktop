name: Build App (Android & Windows)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Install dependencies
        run: pip install "flet>=0.84.0" certifi

      - name: Build APK
        run: flet build apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Litterbox-Android-APK
          path: build/apk/**/*.apk

  windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install "flet>=0.84.0" certifi

      - name: Build Windows EXE
        run: flet build windows
        env:
          PYTHONUTF8: 1

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Litterbox-Windows-EXE
          path: build/windows/**/*.exe
